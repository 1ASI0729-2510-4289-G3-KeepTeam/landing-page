<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keeplio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dekko&family=Inder&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Kirang+Haerang&family=Lexend:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <nav class="navbar" aria-label="Navigation bar">
            <a href="#default"><img class="logo" src="assets/LogoKeeplo2.png" alt="logo"></a>
            <ul class="options">
                <li><a href="#" id="navItem1"></a></li>
                <li><a href="#" id="navItem2"></a></li>
                <li><a href="#" id="navItem3"></a></li>
                <li><button aria-label="Log in to your SafeCycle account" id="LogIn"></button></li>
            </ul>
        </nav>
    </header>

    <section class="Introduction">

        <h1>Keeplo</h1>
        <p id="introductionDesc"></p>

        <button id="startIntroduction"></button>

    </section>

 <section class="Estadisticas">

        <img src="assets/stadistics.png" alt="Personas usando su celular">

        <div class="EstadisticaContainer">

        <div class="ContainerEstadistica">
            <h2>+100</h2>
            <p id="StadisticsNumber1"></p>
        </div>

        <div class="ContainerEstadistica">
            <h2>+2000</h2>
            <p id="StadisticsNumber2"></p>
        </div>
        </div>
    </section>
  <section class="WhatKeeplo">
        <h1 id="WhatsKeeploTitulo"></h1>

        <div class="charactContainter">

            <div class="characteristic">

                <div class="characteristicBG" style="background-color: #A7E3EF;">

                    <img src="assets/share.png" alt="Share icon">

                </div>

                <h3 id="characteristic1Title"></h3>
                <p id="characteristic1desc"></p>

            </div>

            <div class="characteristic">

                <div class="characteristicBG" style="background-color: #FF8B68;">

                    <img src="assets/organization.png" alt="Share icon">

                </div>

                <h3 id="characteristic2Title"></h3>
                <p id="characteristic2desc"></p>

            </div>

            <div class="characteristic">

                <div class="characteristicBG" style="background-color: #F3A738;">

                    <img src="assets/clock.png" alt="Share icon">

                </div>

                <h3 id="characteristic3Title"></h3>
                <p id="characteristic3desc"></p>

            </div>
        </div>

    </section>

     <section class="KeeploUsers">

        <h1 id="keeplouserTitle"></h1>

        <div class="containsContainersUsers">
        <div class="containerUserKeeplo">
            <img src="assets/shopping-svgrepo-com 1.png" alt="Shopping cart icon">

            <div class="containerUserKeeploText">
                <h2 id="keeploUserTitle1"></h2>
                <p id="keeploUserdesc1"></p>
            </div>

        </div>

        <div class="containerUserKeeplo">
            <img src="assets/artist.png" alt="artist palette icon">

            <div class="containerUserKeeploText">
                <h2 id="keeploUserTitle2"></h2>
                <p id="keeploUserdesc2"></p>
            </div>

        </div>
    </div>
    </section>
   <section id="plans">

        <h1 id="plansTitle"></h1>

        <div class="containerPlans">
            <div class="Plan">
                <img src="assets/shopping-svgrepo-com 1.png" alt="shopping cart icon">
                <h3 id="Plan1Title"></h3>
                <h2 id="Plan1Price"></h2>
                <p id="Plan1Description"></p>
                <ul>
                    <li id="Plan1Char1"></li>
                    <li id="Plan1Char2"></li>
                    <li id="Plan1Char3"></li>
                </ul>
                <button id="ButtonStartPlan1" style="background-color: #FEDD72;color: #BD6412;"></button>
            </div>

            <div class="Plan">
                <img src="assets/artist.png" alt="shopping cart icon">
                <h3 id="Plan2Title"></h3>
                <h2 id="Plan2Price"></h2>
                <p id="Plan2Description"></p>
                <ul>
                    <li id="Plan2Char1"></li>
                    <li id="Plan2Char2"></li>
                    <li id="Plan2Char3"></li>
                    <li id="Plan2Char4"></li>
                    <li id="Plan2Char5"></li>
                    <li id="Plan2Char6"></li> 
                </ul>
                <button id="ButtonStartPlan2" style="background-color: #FF8B68;color: white;"></button>
            </div>
        </div>

        <section id="WhyUs">

        <h1 id="WhyUsTitle"></h1>

        <div class="containerWhy">
            <img src="assets/image 17.png" alt="Post-its Image">
            <ul>
                <li id="Reason1"></li>
                <li id="Reason2"></li>
                <li id="Reason3"></li>
                <li id="Reason4"></li>
            </ul>
        </div>

    </section>


    </section>
 <footer>
        <div class="containerFooter">
            <img src="assets/LogoKeeplo2.png" alt="Logo Keeplo">
            <div class="Socials">
                <img src="assets/facebook.png" alt="Logo Facebook">
                <img src="assets/instagram.png" alt="Logo Instagram">
                <img src="assets/twitter.png" alt="Logo Twitter">
            </div>
            <h1 id="contactText" style="color: #FFFAF3;font-size: 30px;"></h1>
        </div>
    </footer>

</body>
</html>
